<svg width="1280" height="1280" viewBox="0 0 1280 1280" fill="none"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="640"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#EEF0FF"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="badge" x1="40" y1="24" x2="472" y2="488"
                    gradientUnits="userSpaceOnUse">
      <stop stop-color="#6366F1"/>
      <stop offset="1" stop-color="#4338CA"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.32" cy="0.18" r="0.9">
      <stop stop-color="#FFFFFF" stop-opacity="0.20"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="12" stdDeviation="14"
                    flood-color="#1E1B4B" flood-opacity="0.45"/>
    </filter>
    <filter id="cardshadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="34"
                    flood-color="#312E81" flood-opacity="0.22"/>
    </filter>
  </defs>

  <!-- the 1280×640 banner, centred in a square canvas so a centre-crop
       extracts it exactly -->
  <g transform="translate(0 320)">
    <rect width="1280" height="640" fill="url(#bg)"/>

    <!-- app-icon badge on the left -->
    <g transform="translate(108 152) scale(0.66)" filter="url(#cardshadow)">
      <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#badge)"/>
      <rect x="16" y="16" width="480" height="480" rx="116" fill="url(#sheen)"/>
      <circle cx="256" cy="262" r="170" fill="none" stroke="#FFFFFF"
              stroke-opacity="0.26" stroke-width="9"
              stroke-dasharray="3 28" stroke-linecap="round"/>
      <g filter="url(#shadow)">
        <path d="M168 121 L168 334 L228 289 L266 391 L302 376 L264 277 L344 268 Z"
              fill="#FFFFFF" stroke="#1E1B4B" stroke-width="11"
              stroke-linejoin="round"/>
      </g>
    </g>

    <!-- wordmark + tagline -->
    <g font-family="-apple-system, 'SF Pro Display', Helvetica, Arial, sans-serif">
      <text x="500" y="292" font-size="58" font-weight="800" fill="#1E1B4B">
        native_mouse_cursor
      </text>
      <text x="502" y="348" font-size="29" font-weight="500" fill="#4B5563">
        Real OS mouse cursors from your own glyphs.
      </text>
      <text x="502" y="402" font-size="23" font-weight="600" fill="#4338CA">
        macOS · Windows · Linux · Android · Web
      </text>
    </g>
  </g>
</svg>
