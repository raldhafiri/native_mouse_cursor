name: native_mouse_cursor
description: "Turn any image, SVG, or painted glyph into a real OS mouse cursor on Flutter desktop, web & Android."
version: 1.1.0
# Author: Rami Al-Dhafiri
homepage: https://github.com/raldhafiri/native_mouse_cursor
repository: https://github.com/raldhafiri/native_mouse_cursor
issue_tracker: https://github.com/raldhafiri/native_mouse_cursor/issues

topics:
  - cursor
  - mouse
  - pointer
  - ui
  - desktop

screenshots:
  - description: "A custom cursor rotates to aim, mirrors across quadrants, and casts a baked drop shadow — shown on the live web demo."
    path: doc/demo.gif

environment:
  sdk: ^3.12.1
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_web_plugins:
    sdk: flutter
  flutter_svg: ^2.3.0
  web: ^1.1.1
  plugin_platform_interface: ^2.1.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:
  # This section identifies this Flutter project as a plugin project.
  # The 'pluginClass' specifies the class (in Java, Kotlin, Swift, Objective-C, etc.)
  # which should be registered in the plugin registry. This is required for
  # using method channels.
  # The Android 'package' specifies package in which the registered class is.
  # This is required for using method channels on Android.
  # The 'ffiPlugin' specifies that native code should be built and bundled.
  # This is required for using `dart:ffi`.
  # All these are used by the tooling to maintain consistency when
  # adding or updating assets for this project.
  plugin:
    platforms:
      android:
        package: dev.raldhafiri.native_mouse_cursor
        pluginClass: NativeMouseCursorPlugin
      ios:
        pluginClass: NativeMouseCursorPlugin
      linux:
        pluginClass: NativeMouseCursorPlugin
      macos:
        pluginClass: NativeMouseCursorPlugin
      windows:
        pluginClass: NativeMouseCursorPluginCApi
      web:
        pluginClass: NativeMouseCursorWeb
        fileName: native_mouse_cursor_web.dart

